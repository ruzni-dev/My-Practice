<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>My JavaScript Page</h1>
    <p>This is a simple HTML page with JavaScript.</p>
    <p class="class-1">Open the console to see the message from JavaScript.</p>
    <p id="paragraph-2">This is another paragraph.</p>

    <h1>Intermediate JavaScript</h1>
    <p>This is a paragraph in the intermediate section.</p>
    <p id="paragraph-3">This is a third paragraph.</p>
    <p id="time"></p>
    <p id="random-number"></p>

    <script>
        // This is a JavaScript comment
        console.log("Hello, World!");
        // You can also manipulate the DOM
        const element = document.querySelector('.class-1');
        element.style.color = "blue";
        element.style.fontSize = "1.2em";
        element.textContent = "This text has been changed by JavaScript!";
        document.getElementById('paragraph-2').style.color = "red";
        document.getElementById('paragraph-2').style.fontSize = "1.2em";
        document.getElementById('paragraph-2').textContent = "This text has also been changed by JavaScript!";
        document.getElementById('paragraph-3').style.color = "green";
        document.getElementById('paragraph-3').style.fontSize = "1.2em";
        document.getElementById('paragraph-3').textContent = "This text has been changed by JavaScript!";
        // Display the current time
        const now = new Date();
        document.getElementById('time').textContent = `Current time: ${now.toLocaleString()}`;
        // Display a random number        const randomNumber = Math.random();
        document.getElementById('random-number').textContent = `Random number: ${randomNumber}`;
    </script>
</body>
</html>
